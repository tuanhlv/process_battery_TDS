name: Battery Analyzer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code into the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Install Python
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # 3. Install the required packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas csv requests numpy matplotlib functools pydantic pytest

    # 4. Execute the tests!
    - name: Run Pytest
      run: |
        python -m pytest tests/ -v
      env:
        PYTHONPATH: .